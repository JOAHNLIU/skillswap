{# filepath: skillswap/templates/disputes/open.html #}
{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card border-0 shadow-sm border-warning">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <div class="fs-1">⚠️</div>
            <h4 class="fw-bold">Відкрити диспут</h4>
            <p class="text-muted small">Обмін #{{ exchange.id }}</p>
          </div>
          <div class="alert alert-warning small">Диспут блокує обмін до рішення адміністрації.</div>
          <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
              <label class="form-label fw-semibold">Причина</label>
              <select name="reason" class="form-select">
                {% for val, lbl in reasons %}<option value="{{ val }}">{{ lbl }}</option>{% endfor %}
              </select>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Опис (мінімум 20 символів)</label>
              <textarea name="description" class="form-control" rows="4" required></textarea>
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-warning rounded-pill fw-semibold">⚠️ Відкрити диспут</button>
              <a href="{{ url_for('exchanges.detail', exchange_id=exchange.id) }}" class="btn btn-outline-secondary rounded-pill">Скасувати</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
