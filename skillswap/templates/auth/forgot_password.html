{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 p-md-5 text-center">

                    <div class="display-4 mb-3">🔐</div>

                    <h1 class="h3 fw-bold mb-3">
                        Відновлення паролю перенесено
                    </h1>

                    <p class="text-muted mb-4">
                        Для безпеки відновлення паролю виконується тільки зі сторінки входу:
                        введіть email акаунта і натисніть кнопку “Забув пароль?”.
                    </p>

                    <a href="{{ url_for('auth.login') }}" class="btn btn-primary rounded-pill fw-semibold">
                        Перейти до входу
                    </a>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
