{# filepath: skillswap/templates/auth/reset_password.html #}
{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <div class="fs-1 mb-2">🔐</div>
            <h4 class="fw-bold">Новий пароль</h4>
          </div>
          <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
              <label class="form-label fw-semibold">Новий пароль</label>
              <input type="password" name="password" class="form-control"
                     placeholder="Мінімум 6 символів" required autofocus/>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Підтвердження</label>
              <input type="password" name="password2" class="form-control"
                     placeholder="Повторіть пароль" required/>
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill fw-semibold">
              ✅ Зберегти новий пароль
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
